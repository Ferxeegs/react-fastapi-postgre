# Redirect HTTP ke HTTPS
server {
    listen 80;
    server_name app.com; # Ganti dengan domain Anda
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name app.com;

    # Jalur Sertifikat SSL (Akan diisi oleh Certbot/Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/app.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.com/privkey.pem;

    # Optimasi SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 1. Frontend (Statik via Nginx Frontend Container)
    location / {
        proxy_pass http://frontend-prod:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # 2. Static Files (Uploads) - Must be before /api/v1/ to avoid conflicts
    location /uploads/ {
        proxy_pass http://backend-prod:8000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache static files
        expires 30d;
        add_header Cache-Control "public, immutable";
        
        # Set correct content types
        types {
            image/jpeg jpg jpeg;
            image/png png;
            image/gif gif;
            image/webp webp;
            image/svg+xml svg;
        }
    }

    # 2.1. Backend API
    location /api/v1/ {
        proxy_pass http://backend-prod:8000/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Adminer (Akses Terbatas)
    location /ff/ {
        proxy_pass http://adminer:8080/;
        proxy_set_header Host $host;
        # Tips: Tambahkan auth_basic di sini untuk keamanan extra
    }

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}